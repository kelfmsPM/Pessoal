<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Roadmap de Estudos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --bg:#F3F4F6;
    --ink:#14171F;
    --linha1:#3568D4;
    --linha2:#D9483A;
    --linha3:#1F9E6D;
    --linha4:#A855C7;
    --card:#FFFFFF;
    --muted:#6B7280;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--ink);
    padding:40px 24px 80px;
  }
  .wrap{max-width:980px;margin:0 auto;}

  header{margin-bottom:36px;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:10px;
  }
  h1{
    font-family:'Archivo',sans-serif;
    font-weight:800;
    font-size:clamp(28px,5vw,42px);
    line-height:1.05;
    margin:0 0 8px;
    letter-spacing:-0.01em;
  }
  .sub{
    color:var(--muted);
    font-size:15px;
    max-width:520px;
    line-height:1.5;
  }

  .stats{
    display:flex;
    gap:10px;
    margin-top:22px;
    flex-wrap:wrap;
  }
  .stat{
    background:var(--card);
    border:1px solid #E5E7EB;
    border-radius:10px;
    padding:10px 16px;
    min-width:110px;
  }
  .stat .n{
    font-family:'Archivo',sans-serif;
    font-weight:800;
    font-size:22px;
    line-height:1;
  }
  .stat .l{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--muted);
    margin-top:4px;
  }

  .legend{
    display:flex;
    gap:22px;
    margin-top:24px;
    flex-wrap:wrap;
    font-size:12.5px;
    color:var(--muted);
    font-family:'IBM Plex Mono',monospace;
  }
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .lg-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--ink);display:inline-block;}
  .lg-dot.half{background:linear-gradient(90deg,var(--ink) 50%, transparent 50%);}
  .lg-dot.full{background:var(--ink);}

  .linha{
    margin-top:44px;
  }
  .linha-titulo{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:6px;
  }
  .linha-num{
    font-family:'Archivo',sans-serif;
    font-weight:800;
    font-size:13px;
    color:#fff;
    padding:2px 9px;
    border-radius:5px;
  }
  .linha-nome{
    font-family:'Archivo',sans-serif;
    font-weight:700;
    font-size:18px;
  }
  .linha-count{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--muted);
    margin-left:auto;
  }

  .trilho{
    position:relative;
    display:flex;
    align-items:flex-start;
    gap:0;
    padding:34px 6px 10px;
    overflow-x:auto;
  }
  .trilho::before{
    content:'';
    position:absolute;
    left:24px; right:24px; top:52px;
    height:4px;
    background:var(--linecolor);
    border-radius:2px;
    z-index:0;
  }

  .estacao{
    position:relative;
    flex:1 0 120px;
    min-width:120px;
    display:flex;
    flex-direction:column;
    align-items:center;
    z-index:1;
    cursor:pointer;
    user-select:none;
  }
  .ponto{
    width:26px;height:26px;
    border-radius:50%;
    border:4px solid var(--linecolor);
    background:#fff;
    transition:background .15s, transform .15s;
    margin-top:40px;
  }
  .estacao:hover .ponto{transform:scale(1.12);}
  .estacao[data-status="1"] .ponto{
    background:linear-gradient(90deg,var(--linecolor) 50%, #fff 50%);
  }
  .estacao[data-status="2"] .ponto{
    background:var(--linecolor);
  }
  .estacao-nome{
    margin-top:10px;
    font-size:13px;
    font-weight:600;
    text-align:center;
    line-height:1.25;
    max-width:130px;
  }
  .estacao-status{
    margin-top:3px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.04em;
  }

  .hub .ponto{
    width:32px;height:32px;
    border-width:5px;
    box-shadow:0 0 0 3px #fff, 0 0 0 5px var(--linecolor);
    margin-top:36px;
  }
  .hub .estacao-nome{font-weight:700;}

  .ramal{
    position:relative;
    margin-top:14px;
    display:flex;
    justify-content:center;
    gap:26px;
    padding-top:22px;
  }
  .ramal::before{
    content:'';
    position:absolute;
    top:0; left:50%;
    width:2px; height:22px;
    background:var(--linecolor);
    opacity:.55;
  }
  .ramal .estacao{flex:0 0 84px; min-width:84px;}
  .ramal .ponto{width:18px;height:18px;border-width:3px;margin-top:0;}
  .ramal .estacao-nome{font-size:11.5px;max-width:90px;}

  footer{
    margin-top:56px;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--muted);
    text-align:center;
  }

  @media (max-width:640px){
    .trilho{overflow-x:visible;flex-wrap:wrap;padding-top:26px;}
    .trilho::before{display:none;}
    .estacao{flex:0 0 45%;margin-bottom:18px;}
    .ponto{margin-top:0;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Bestfy · Roadmap pessoal de estudos</div>
    <h1>Mapa de estudos</h1>
    <div class="sub">Clique em uma estação para avançar o status: a estudar → estudando → concluído.</div>

    <div class="stats" id="stats"></div>

    <div class="legend">
      <span><span class="lg-dot"></span>A estudar</span>
      <span><span class="lg-dot half"></span>Estudando</span>
      <span><span class="lg-dot full"></span>Concluído</span>
    </div>
  </header>

  <div id="linhas"></div>

  <footer>Toque nas estações para atualizar o progresso — o estado é local a esta visualização.</footer>
</div>

<script>
const linhas = [
  {
    nome:'Aquisição & Analytics', cor:'#3568D4',
    estacoes:[
      {id:'intercom', nome:'Intercom'},
      {id:'pixel', nome:'Pixel Google'},
    ]
  },
  {
    nome:'Monetização', cor:'#D9483A',
    estacoes:[
      {id:'orderbump', nome:'Order Bump'},
      {id:'upsell', nome:'UpSell'},
      {id:'juros', nome:'Adicional de juros — cadastro seller'},
      {id:'split', nome:'Split de Pagamento'},
    ]
  },
  {
    nome:'Experiência de Checkout', cor:'#1F9E6D',
    estacoes:[
      {id:'personalizacao', nome:'Personalização Checkout', hub:true, sub:[
        {id:'banner', nome:'Banner'},
        {id:'cortexto', nome:'Cor de texto'},
        {id:'cronometro', nome:'Cronômetro'},
        {id:'provasocial', nome:'Prova Social'},
      ]},
      {id:'recompensa', nome:'Tela de Recompensa'},
    ]
  },
  {
    nome:'Integrações', cor:'#A855C7',
    estacoes:[
      {id:'woocommerce', nome:'Sincronização Woocommerce'},
    ]
  },
];

const statusLabel = ['A estudar','Estudando','Concluído'];
const state = {};

function allStations(){
  const list = [];
  linhas.forEach(l=>{
    l.estacoes.forEach(e=>{
      list.push(e);
      if(e.sub) e.sub.forEach(s=>list.push(s));
    });
  });
  return list;
}
allStations().forEach(e=> state[e.id] = 0);

function renderStats(){
  const total = allStations().length;
  const done = allStations().filter(e=>state[e.id]===2).length;
  const doing = allStations().filter(e=>state[e.id]===1).length;
  const todo = total - done - doing;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="n">${total}</div><div class="l">Temas totais</div></div>
    <div class="stat"><div class="n">${done}</div><div class="l">Concluídos</div></div>
    <div class="stat"><div class="n">${doing}</div><div class="l">Estudando</div></div>
    <div class="stat"><div class="n">${todo}</div><div class="l">A estudar</div></div>
  `;
}

function estacaoHTML(e, cor){
  return `<div class="estacao" data-id="${e.id}" data-status="${state[e.id]}" style="--linecolor:${cor}">
    <div class="ponto"></div>
    <div class="estacao-nome">${e.nome}</div>
    <div class="estacao-status">${statusLabel[state[e.id]]}</div>
  </div>`;
}

function renderLinhas(){
  const container = document.getElementById('linhas');
  container.innerHTML = linhas.map((l, idx) => {
    const totalL = l.estacoes.reduce((acc,e)=> acc + 1 + (e.sub?e.sub.length:0), 0);
    const doneL = l.estacoes.reduce((acc,e)=>{
      let c = state[e.id]===2 ? 1 : 0;
      if(e.sub) c += e.sub.filter(s=>state[s.id]===2).length;
      return acc + c;
    },0);

    const hub = l.estacoes.find(e=>e.hub);
    const stationsHTML = l.estacoes.map(e=>{
      const cls = e.hub ? 'estacao hub' : 'estacao';
      const html = `<div class="${cls}" data-id="${e.id}" data-status="${state[e.id]}" style="--linecolor:${l.cor}">
        <div class="ponto"></div>
        <div class="estacao-nome">${e.nome}</div>
        <div class="estacao-status">${statusLabel[state[e.id]]}</div>
      </div>`;
      return html;
    }).join('');

    const ramalHTML = hub && hub.sub ? `<div class="ramal" style="--linecolor:${l.cor}">
      ${hub.sub.map(s=>estacaoHTML(s, l.cor)).join('')}
    </div>` : '';

    return `<section class="linha">
      <div class="linha-titulo">
        <span class="linha-num" style="background:${l.cor}">L${idx+1}</span>
        <span class="linha-nome">${l.nome}</span>
        <span class="linha-count">${doneL}/${totalL} concluídos</span>
      </div>
      <div class="trilho" style="--linecolor:${l.cor}">
        ${stationsHTML}
      </div>
      ${ramalHTML}
    </section>`;
  }).join('');

  container.querySelectorAll('.estacao').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.getAttribute('data-id');
      state[id] = (state[id] + 1) % 3;
      renderLinhas();
      renderStats();
    });
  });
}

renderStats();
renderLinhas();
</script>
</body>
</html>
